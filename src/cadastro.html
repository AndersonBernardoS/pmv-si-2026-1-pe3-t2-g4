<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - AgendaCar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-blue: #143c88;
            --sidebar-blue: #2a56a6;
            --primary-orange: #f47920;
            --orange-hover: #e06815;
            --bg-gray: #f5f6f8;
            --text-dark: #333;
            --text-blue: #1c3d7a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        body { background-color: var(--bg-gray); color: var(--text-dark); display: flex; flex-direction: column; min-height: 100vh; }
        header { background-color: var(--primary-blue); height: 80px; display: flex; justify-content: space-between; align-items: center; padding: 0 40px; color: white; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 10; }
        .logo { display: flex; align-items: center; gap: 10px; font-size: 24px; font-weight: 700; text-transform: uppercase; text-decoration: none; cursor: pointer; }
        .logo i, .logo span { color: white; }
        .login-container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 40px 20px; }
        .login-card { background: white; width: 100%; max-width: 450px; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #eaeaea; text-align: center; }
        .login-card h2 { color: var(--text-blue); margin-bottom: 10px; font-size: 28px; }
        .login-card p { color: #666; margin-bottom: 30px; font-size: 14px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: var(--text-blue); }
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-wrapper i { position: absolute; left: 15px; color: #999; }
        .input-wrapper input { width: 100%; padding: 12px 12px 12px 40px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; outline: none; transition: border-color 0.3s; }
        .input-wrapper input:focus { border-color: var(--primary-blue); }
        .btn-login { width: 100%; background-color: var(--primary-orange); color: white; border: none; padding: 15px; border-radius: 6px; font-size: 18px; font-weight: 700; cursor: pointer; margin-top: 10px; transition: background 0.3s; }
        .btn-login:hover { background-color: var(--orange-hover); }
        .login-links { margin-top: 25px; display: flex; flex-direction: column; gap: 10px; font-size: 14px; }
        .login-links a { color: var(--primary-blue); text-decoration: none; font-weight: 500; transition: color 0.3s; }
        .login-links a:hover { color: var(--primary-orange); text-decoration: underline; }
        
        #msg-feedback { font-size: 14px; margin-bottom: 15px; padding: 10px; border-radius: 6px; display: none; font-weight: 500; }
        .msg-error { background-color: #ffeaea; color: #d93025; border: 1px solid #d93025; }
        .msg-success { background-color: #e6f4ea; color: #1e8e3e; border: 1px solid #1e8e3e; }
        
        footer { background-color: #e6e6e6; padding: 15px 40px; display: flex; justify-content: flex-start; align-items: center; gap: 15px; }
        footer i { font-size: 28px; color: #333; cursor: pointer; transition: color 0.3s; }
        footer i:hover { color: var(--primary-orange); }
        /* Ajuste para o container da logo */
.Logo {
    display: flex;
    align-items: left;
    height: 100%; 
}


.Logo img {
    height: 80px;       
    width: auto;        
    display: block;
}
    </style>
</head>
<body>

    <header>
        <div class="Logo">
            <img src="img/Logo.jpg">
        </div>
    </header>

    <div class="login-container">
        <div class="login-card">
            <h2>Crie sua conta</h2>
            <p>Cadastre-se para começar a agendar seus serviços.</p>
            
            <div id="msg-feedback"></div>

            <form id="form-cadastro">
                <div class="form-group">
                    <label for="nome_cad">Nome Completo</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-id-card"></i>
                        <input type="text" id="nome_cad" placeholder="Digite seu nome completo" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email_cad">E-mail</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" id="email_cad" placeholder="Digite seu e-mail" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password_cad">Senha</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password_cad" placeholder="Crie uma senha forte" required>
                    </div>
                </div>

                <button type="submit" class="btn-login">Cadastrar</button>
            </form>

            <div class="login-links">
                <p>Já tem uma conta? <a href="login.html">Faça login aqui</a></p>
            </div>
        </div>
    </div>

    <footer>
        <i class="fa-brands fa-instagram"></i>
        <i class="fa-brands fa-youtube"></i>
    </footer>

    <script>
        document.getElementById('form-cadastro').addEventListener('submit', function(event) {
            event.preventDefault();
            
            const nome = document.getElementById('nome_cad').value.trim();
            const email = document.getElementById('email_cad').value.trim().toLowerCase();
            const password = document.getElementById('password_cad').value.trim();
            const feedback = document.getElementById('msg-feedback');

            let usuarios = JSON.parse(localStorage.getItem('agendacar_usuarios')) || [];
            const emailExiste = usuarios.find(u => u.email === email);

            if (emailExiste) {
                feedback.textContent = 'Este e-mail já está cadastrado!';
                feedback.className = 'msg-error';
                feedback.style.display = 'block';
                return;
            }

            const novoUsuario = {
                id: Date.now(),
                nome: nome,
                email: email,
                senha: password,
                tipo: 'cliente'
            };

            usuarios.push(novoUsuario);
            localStorage.setItem('agendacar_usuarios', JSON.stringify(usuarios));

            feedback.textContent = 'Cadastro realizado com sucesso! Redirecionando...';
            feedback.className = 'msg-success';
            feedback.style.display = 'block';

            setTimeout(() => {
                window.location.href = 'login.html';
            }, 2000);
        });
    </script>
</body>
</html>
