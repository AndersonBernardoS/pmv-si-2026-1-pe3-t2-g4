<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AgendaCar - Serviços Automotivos</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />

    <style>
      .background-visuals {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
        pointer-events: none;
        background: linear-gradient(135deg, #e4e9f2 0%, #d8dfea 100%);
        overflow: hidden;
      }
      .tech-grid {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image:
          linear-gradient(rgba(16, 60, 143, 0.08) 1px, transparent 1px),
          linear-gradient(90deg, rgba(16, 60, 143, 0.08) 1px, transparent 1px);
        background-size: 60px 60px;
        transform: perspective(500px) rotateX(60deg) translateY(-100px)
          translateZ(-200px);
        animation: gridMove 20s linear infinite;
      }
      @keyframes gridMove {
        0% {
          transform: perspective(500px) rotateX(60deg) translateY(0)
            translateZ(-200px);
        }
        100% {
          transform: perspective(500px) rotateX(60deg) translateY(60px)
            translateZ(-200px);
        }
      }

      header {
        background: rgba(7, 53, 138, 0.932);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        height: 80px;
        width: 100%;
        flex-shrink: 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 40px;
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .Logo {
        display: flex;
        align-items: center;
        height: 100%;
        text-decoration: none;
      }
      .Logo img {
        height: 60px;
        width: auto;
        display: block;
        filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
        border-radius: 8px;
      }
      .btn-header {
        background: rgba(255, 255, 255, 0.1);
        color: white;
        border: 1px solid rgba(255, 255, 255, 0.4);
        padding: 10px 24px;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s ease;
        text-decoration: none;
      }
      .btn-header:hover {
        background: rgba(255, 255, 255, 0.2);
        transform: translateY(-2px);
      }

      .main-container {
        display: flex;
        flex: 1;
        position: relative;
        z-index: 20;
      }

      .sidebar {
        width: 280px;
        background: linear-gradient(
          180deg,
          rgba(11, 57, 143, 0.95) 0%,
          rgba(6, 45, 92, 0.95) 45%,
          rgba(1, 6, 15, 0.8) 100%
        );
        backdrop-filter: blur(25px);
        -webkit-backdrop-filter: blur(25px);
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        box-shadow: 4px 0 20px rgba(0, 0, 0, 0.1);
        border-right: 1px solid rgba(255, 255, 255, 0.1);
      }
      .menu-services {
        padding: 30px 20px;
        display: flex;
        flex-direction: column;
        gap: 15px;
      }
      .service-btn {
        background: linear-gradient(
          135deg,
          rgba(244, 121, 32, 0.9),
          rgba(224, 104, 21, 0.9)
        );
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 12px;
        color: white;
        padding: 15px;
        display: flex;
        align-items: center;
        gap: 15px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        text-align: left;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
        transition: all 0.3s;
      }
      .service-btn:hover {
        transform: translateX(5px);
        box-shadow: 0 6px 20px rgba(244, 121, 32, 0.4);
      }
      .service-btn i {
        font-size: 20px;
        background-color: rgba(255, 255, 255, 0.2);
        padding: 10px;
        border-radius: 8px;
      }

      .institucional {
        padding: 30px 20px;
        flex: 1;
      }
      .institucional h3 {
        color: white;
        margin-bottom: 15px;
        font-size: 18px;
        font-weight: 800;
      }
      .institucional ul {
        list-style: none;
      }
      .institucional li {
        margin-bottom: 12px;
      }
      .institucional a {
        text-decoration: none;
        color: white;
        font-size: 14px;
        font-weight: 500;
        opacity: 0.7;
        transition: opacity 0.3s;
      }
      .institucional a:hover {
        opacity: 1;
        text-decoration: underline;
      }

      .content {
        flex: 1;
        padding: 50px 40px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .content h1 {
        font-size: 24px;
        margin-bottom: 48px;
      }

      .content .content-body {
        display: flex;
        flex-wrap: wrap;
        column-gap: 16px;
      }

      .content .content-body > * {
        flex: 1;
      }

      .card-prestador-container {
        padding: 16px;
      }

      .card-prestador {
        border: 1px solid #d9d9d9;
        border-radius: 8px;
        padding: 24px;
        position: relative;
      }

      .card-prestador h3 {
        font-size: 24px;
      }

      .card-prestador span {
        font-size: 16px;
        font-weight: 600;
        color: #757575;
        margin-bottom: 8px;
        display: block;
      }

      .card-prestador p {
        font-size: 16px;
        font-weight: 400;
        color: #1e1e1e;
        margin-bottom: 24px;
      }

      .card-prestador img {
        position: absolute;
        top: -30px;
        right: -10px;
        width: 100px;
        height: 100px;
        border-radius: 60px;
      }

      .texto-orcamento {
        resize: none;
        width: 100%;
        flex: 1;
        min-height: 190px;
        border: 1px solid #d9d9d9;
        border-radius: 8px;
        padding: 12px;
        background: white;
        font-family: 'Roboto', sans-serif;
        font-size: medium;
        box-sizing: border-box;
      }

      .grupo-input {
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      .form-orcamento {
        flex: 1;
        min-width: 300px;
        display: flex;
        flex-direction: column;
      }
      
      .label-orcamento {
        display: block;
        font-size: 16px;
        font-weight: 500;
        color: #1e1e1e;
        margin-bottom: 12px;
      }

      footer {
        background: rgb(42, 50, 59);
        backdrop-filter: blur(10px);
        border-top: 1px solid rgba(0, 0, 0, 0.05);
        padding: 10px 40px;
        display: flex;
        justify-content: flex-start;
        align-items: center;
        gap: 20px;
        position: relative;
        z-index: 20;
      }
      footer i {
        font-size: 22px;
        color: #718096;
        cursor: pointer;
        transition:
          color 0.3s,
          transform 0.2s;
      }
      footer i:hover {
        color: var(--primary-orange);
        transform: scale(1.15) translateY(-2px);
      }

      /* ======== ESTILOS DO MODAL DE LOGOUT ANIMADO ======== */
      .logout-modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(1, 6, 15, 0.6);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        opacity: 0;
        visibility: hidden;
        transition: all 0.3s ease;
      }

      .logout-modal-overlay.active {
        opacity: 1;
        visibility: visible;
      }

      .logout-modal {
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.95),
          rgba(255, 255, 255, 0.8)
        );
        padding: 40px;
        border-radius: 24px;
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.8);
        box-shadow: 0 15px 50px rgba(0, 0, 0, 0.3);
        max-width: 400px;
        width: 90%;
        transform: scale(0.8) translateY(30px);
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      .logout-modal-overlay.active .logout-modal {
        transform: scale(1) translateY(0);
      }

      .logout-modal i.icon-alert {
        font-size: 55px;
        color: #ff8a1a;
        margin-bottom: 20px;
        filter: drop-shadow(0 4px 6px rgba(244, 121, 32, 0.3));
      }

      .logout-modal h3 {
        color: #0b4d8f;
        font-size: 24px;
        margin-bottom: 15px;
        font-weight: 800;
      }
      .logout-modal p {
        color: #374151;
        margin-bottom: 30px;
        font-size: 16px;
        line-height: 1.5;
      }

      .logout-buttons {
        display: flex;
        gap: 15px;
        justify-content: center;
      }

      .btn-cancel {
        flex: 1;
        padding: 12px;
        border-radius: 12px;
        border: 2px solid #cbd5e1;
        background: transparent;
        color: #374151;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: 0.3s;
      }
      .btn-cancel:hover {
        background: rgba(0, 0, 0, 0.05);
        color: #1f2937;
        border-color: #a0aec0;
      }

      .btn-confirm {
        flex: 1;
        padding: 12px;
        border-radius: 12px;
        border: none;
        background: linear-gradient(135deg, #f47120, #ff9040);
        color: white;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: 0.3s;
        box-shadow: 0 4px 15px rgba(244, 121, 32, 0.3);
      }
      .btn-confirm:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(244, 121, 32, 0.5);
      }

      /* ======== ESTILOS DO MODAL DE CONFIRMAÇÃO / SAÍDA (ADICIONADOS) ======== */
      .confirm-modal-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.35); display: flex; align-items: center; justify-content: center;
        z-index: 10000; opacity: 0; visibility: hidden; transition: opacity 0.2s ease;
      }
      .confirm-modal-overlay.active { opacity: 1; visibility: visible; }
      .confirm-modal { background: white; padding: 28px; border-radius: 12px; box-shadow: 0 12px 40px rgba(0,0,0,0.25); max-width: 480px; width: 92%; text-align: center; }
      .confirm-modal h3 { margin: 8px 0; color: #0b4d8f; font-size: 20px; }
      .confirm-modal p { color: #374151; margin: 8px 0 0 0; }

      @media (max-width: 900px) {
        .cards-container,
        .main-container {
          flex-direction: column;
        }
        .sidebar {
          width: 100%;
          flex-direction: row;
          flex-wrap: wrap;
          border-right: none;
          border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .menu-services {
          flex-direction: row;
          flex-wrap: wrap;
          justify-content: center;
        }
        .institucional {
          width: 100%;
          border-top: none;
          border-left: 1px solid rgba(255, 255, 255, 0.1);
        }
      }
    </style>
  </head>
  <body>
    <div class="background-visuals">
      <div class="tech-grid"></div>
    </div>

    <header>
      <a href="home.html" class="Logo">
        <img
          src="img/HLogo.png"
          alt="Logo AgendaCar"
          onerror="this.style.display = 'none'"
        />
      </a>
      <button class="btn-header" onclick="showLogoutModal()">
        Entrar / Cadastrar
      </button>
    </header>

    <div class="main-container">
      <aside class="sidebar">
        <div class="menu-services">
          <button class="service-btn" data-categoria="Mecânica Geral">
            <i class="fa-solid fa-wrench"></i> Mecânica Geral
          </button>
          <button class="service-btn" data-categoria="Motores">
            <i class="fa-solid fa-cogs"></i> Motores
          </button>
          <button class="service-btn" data-categoria="Suspensão">
            <i class="fa-solid fa-car-burst"></i> Suspensão
          </button>
          <button class="service-btn" data-categoria="Lanternagem/Pintura">
            <i class="fa-solid fa-spray-can"></i> Lanternagem/Pintura
          </button>
          <button class="service-btn" data-categoria="Outros Serviços">
            <i class="fa-solid fa-toolbox"></i> Outros serviços
          </button>
        </div>

        <div class="institucional">
          <h3>Institucional</h3>
          <ul>
            <li><a href="quem-somos.html">Quem somos?</a></li>
            <li><a href="fale-conosco.html">Fale conosco</a></li>
            <li><a href="termos-uso.html">Termos de Uso</a></li>
            <li>
              <a href="politica-privacidade.html">Política de Privacidade</a>
            </li>
          </ul>
        </div>
      </aside>

      <main class="content">
        <h1>Solicitação de Orçamento</h1>
        <div class="content-body">
          <div class="card-prestador-container">
            <div class="card-prestador">
              <h3></h3>
              <span></span>
              <p></p>
              <img src="" alt="Imagem prestador" />
            </div>
          </div>
          <form class="form-orcamento">
            <div class="form-input">
              <label class="label-orcamento">Descreva o problema que precisa resolver.</label>
              <textarea class="texto-orcamento" placeholder="Resumo do problema"></textarea>
            </div>
          </form>
        </div>
      </main>
    </div>

    <footer>
      <i class="fa-brands fa-instagram"></i>
      <i class="fa-brands fa-youtube"></i>
    </footer>

    <div class="logout-modal-overlay" id="logoutModal">
      <div class="logout-modal">
        <i class="fa-solid fa-person-walking-arrow-right icon-alert"></i>
        <h3>Já vai embora?</h3>
        <p>Tem certeza que deseja sair da sua conta ?</p>

        <div class="logout-buttons">
          <button class="btn-cancel" onclick="hideLogoutModal()">
            Cancelar
          </button>
          <button class="btn-confirm" onclick="confirmLogout()">
            Sim, sair
          </button>
        </div>
      </div>
    </div>

    <div class="confirm-modal-overlay" id="leaveModal">
        <div class="confirm-modal">
            <i class="fa-solid fa-triangle-exclamation" style="font-size:48px;color:#f47120;margin-bottom:12px;"></i>
            <h3 style="color:#0b4d8f;">Cancelar orçamento?</h3>
            <p style="color:#374151;">Todo o seu progresso atual será perdido. Tem certeza que deseja sair desta página?</p>
            <div style="margin-top:18px;display:flex;gap:12px;justify-content:center;">
                <button class="btn-cancel" onclick="hideLeaveModal()">Não</button>
                <button class="btn-confirm" id="btnConfirmLeave">Sim</button>
            </div>
        </div>
    </div>

    <script src="prestadores.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const sessaoStr = localStorage.getItem("agendacar_sessao");

        // Protege a rota: Se não tiver sessão, manda pro login
        if (!sessaoStr) {
          window.location.href = "login.html";
          return;
        }

        // Exibe a saudação no header
        const usuario = JSON.parse(sessaoStr);
        const btnHeader = document.querySelector(".btn-header");

        if (btnHeader) {
          const nomeSeguro = usuario.nome || "Usuário";
          const primeiroNome = nomeSeguro.split(" ")[0];

          // nova função do modal
          btnHeader.innerHTML = `<i class="fa-solid fa-user-check"></i> Olá, ${primeiroNome} (Sair)`;
          btnHeader.onclick = showLogoutModal;
        }
        
        // Inicializa o modal de saída da página
        initLeaveModalBehavior();
      });

      // ==========================================
      // LÓGICA DO MODAL DE SAIR DO ORÇAMENTO
      // ==========================================
      let urlDestino = '';

      function initLeaveModalBehavior() {
          // Lógica para os botões do menu lateral
          const serviceBtns = document.querySelectorAll('.service-btn');
          
          serviceBtns.forEach(function(btn) {
              btn.addEventListener('click', function(e) {
                  e.preventDefault();
                  
                  const categoria = this.getAttribute('data-categoria');
                  urlDestino = 'catalogo-prestadores.html?categoria=' + encodeURIComponent(categoria);
                  
                  document.getElementById('leaveModal').classList.add('active');
              });
          });

          // Lógica para a Logo
          const logo = document.querySelector('.Logo');
          if (logo) {
              logo.addEventListener('click', function(e) {
                  e.preventDefault();
                  urlDestino = this.getAttribute('href'); 
                  document.getElementById('leaveModal').classList.add('active');
              });
          }

          // Ação do botão "Sim" (Confirma a saída)
          document.getElementById('btnConfirmLeave').addEventListener('click', function() {
              if (urlDestino) {
                  window.location.href = urlDestino;
              }
          });
      }

      function hideLeaveModal() {
          document.getElementById('leaveModal').classList.remove('active');
          urlDestino = ''; 
      }
      // ==========================================

      // FUNÇÕES DO MODAL DE LOGOUT
      const modalOverlay = document.getElementById("logoutModal");

      function showLogoutModal(event) {
        if (event) event.preventDefault();
        modalOverlay.classList.add("active");
      }

      function hideLogoutModal() {
        modalOverlay.classList.remove("active");
      }

      function confirmLogout() {
        localStorage.removeItem("agendacar_sessao");
        // direciona de volta para a Landing Page
        window.location.href = "index.html";
      }

      // Se clicar fora da caixa do modal, ele fecha
      modalOverlay.addEventListener("click", function (e) {
        if (e.target === modalOverlay) {
          hideLogoutModal();
        }
      });

      // Clicar no logo também exibe o modal caso queira sair (foi substituído pela lógica initLeaveModalBehavior)
      function deslogarEIrParaLanding(event) {
        showLogoutModal(event);
      }

      function getURLParameter(param) {
        var sPageURL = window.location.search.substring(1);
        var sURLVariables = sPageURL.split("&");
        for (var i = 0; i < sURLVariables.length; i++) {
          var sParameterName = sURLVariables[i].split("=");
          if (sParameterName[0] == param) {
            return sParameterName[1];
          }
        }
      }

      function notFound() {
        document.querySelector("main.content").innerHTML =
          "<h1>Ocorreu um erro ao buscar prestador.</h1>";
      }

      const prestadorId = getURLParameter("prestador");
      if (prestadorId) {
        const prestador = getPrestadorById(prestadorId); // Necessita do seu prestadores.js
        if (prestador) {
          document.querySelector(".card-prestador-container h3").textContent =
            prestador.nome;
          document.querySelector(".card-prestador-container span").textContent =
            prestador.categoria;
          document.querySelector(".card-prestador-container p").textContent =
            prestador.descricao;
          document.querySelector(".card-prestador-container img").src =
            prestador.imagemUrl;
        } else {
          notFound();
        }
      } else {
        notFound();
      }
    </script>
  </body>
</html>
