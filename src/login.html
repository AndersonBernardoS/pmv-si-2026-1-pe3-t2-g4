<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AgendaCar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    
    <style>
        /* TESTEANIMAÇÕES DE FUNDO*/
        .background-visuals {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none; 
            background: linear-gradient(135deg, #e4e9f2 0%, #d8dfea 100%);
            overflow: hidden;
        }
        .tech-grid {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(16, 60, 143, 0.12) 1px, transparent 1px),
                linear-gradient(90deg, rgba(16, 60, 143, 0.12) 1px, transparent 1px);
            background-size: 60px 60px;
            transform: perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px);
            animation: gridMove 20s linear infinite;
        }
        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0) translateZ(-200px); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(60px) translateZ(-200px); }
        }
        
        .side-glow {
            position: absolute; top: 0; bottom: 0; width: 250px; filter: blur(90px);
        }
        .side-glow-left {
            left: -50px; background: var(--primary-blue);
            animation: fadeGlow 4s infinite alternate ease-in-out;
        }
        .side-glow-right {
            right: -50px; background: var(--primary-orange);
            animation: fadeGlow 5.5s infinite alternate ease-in-out; 
        }
        @keyframes fadeGlow {
            0% { opacity: 0; }
            100% { opacity: 0.6; }
        }

        /*TESTE HEADER PADRÃO*/
        header { 
            background: rgba(5, 46, 122, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            height: 80px; display: flex; justify-content: space-between; align-items: center; 
            padding: 0 40px; box-shadow: 0 4px 30px rgba(0,0,0,0.1); border-bottom: 1px solid rgba(255,255,255,0.2);
            position: sticky; top: 0; z-index: 100; 
        }
        .Logo { display: flex; align-items: center; height: 100%; text-decoration: none; }
        .Logo img { height: 60px; width: auto; display: block; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); border-radius: 8px;}
        
        /* RODAPÉ PADRÃO*/
        footer { 
            background: rgb(42, 50, 59); backdrop-filter: blur(10px);
            border-top: 1px solid rgba(0,0,0,0.2); 
            padding: 10px 40px; 
            display: flex; justify-content: flex-start; align-items: center; gap: 20px; 
            margin-top: auto; position: relative; z-index: 20;
        }
        footer i { font-size: 22px; color: #a0aec0; cursor: pointer; transition: color 0.3s, transform 0.2s; }
        footer i:hover { color: var(--primary-orange); transform: scale(1.15) translateY(-2px); }
        .footer-links { margin-left: auto; display: flex; gap: 25px; }
        .footer-links a { color: #cbd5e1; text-decoration: none; font-size: 14px; font-weight: 500; transition: color 0.3s; }
        .footer-links a:hover { color: var(--primary-orange); }

        /* LOADER */
        .loader-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background-color: rgba(18, 54, 138, 0.98); backdrop-filter: blur(8px); 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 9999; opacity: 0; visibility: hidden; transition: opacity 0.4s ease; 
        }
        .loader-overlay.active { opacity: 1; visibility: visible; }
        .cyber-loader { position: relative; width: 100px; height: 100px; margin-bottom: 25px; display: flex; justify-content: center; align-items: center; }
        .cyber-loader::before, .cyber-loader::after { content: ''; position: absolute; border-radius: 50%; border: 4px solid transparent; }
        .cyber-loader::before { top: 0; left: 0; right: 0; bottom: 0; border-top-color: var(--primary-orange); border-bottom-color: var(--primary-orange); animation: spin 1.5s linear infinite; }
        .cyber-loader::after { top: 15px; left: 15px; right: 15px; bottom: 15px; border-left-color: #9ad4e4; border-right-color: #9ad4e4; animation: spinReverse 1s linear infinite; }
        .loader-gear { font-size: 32px; color: #9ad4e4; animation: spin 3s linear infinite; z-index: 2; }
        .loader-text { color: #9ad4e4; font-size: 18px; font-weight: 500; letter-spacing: 3px; animation: pulseText 1.5s ease-in-out infinite; text-transform: uppercase;}
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes spinReverse { 0% { transform: rotate(360deg); } 100% { transform: rotate(0deg); } }
        @keyframes pulseText { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /*LOGIN CONTAINER */
        .login-container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 40px 20px; position: relative; z-index: 20; }
        .login-card { 
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.8), rgba(255, 255, 255, 0.4)); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            width: 100%; max-width: 450px; padding: 40px; border-radius: 24px; 
            box-shadow: var(--glass-shadow); border: 1px solid var(--glass-border); 
            border-top: 1px solid rgba(255,255,255,0.9); border-left: 1px solid rgba(255,255,255,0.9);
            text-align: center; 
        }
        .login-card h2 { color: var(--text-blue); margin-bottom: 10px; font-size: 28px; font-weight: 800;}
        .login-card p { color: var(--text-light); margin-bottom: 30px; font-size: 15px; line-height: 1.5;}
        
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--text-blue); font-size: 14px;}
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-wrapper i { position: absolute; left: 15px; color: var(--primary-blue); opacity: 0.7;}
        .input-wrapper input { 
            width: 100%; padding: 14px 12px 14px 45px; 
            border: 1px solid rgba(255,255,255,0.6); border-radius: 10px; font-size: 15px; 
            outline: none; transition: all 0.3s; background: rgba(255,255,255,0.6);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }
        .input-wrapper input:focus { border-color: var(--primary-blue); background: white; box-shadow: 0 0 0 3px rgba(16, 60, 143, 0.1); }
        
        .btn-login { 
            width: 100%; background: linear-gradient(135deg, var(--primary-orange), #ff9040); 
            color: white; border: 1px solid rgba(255,255,255,0.4); padding: 15px; border-radius: 10px; 
            font-size: 18px; font-weight: 700; cursor: pointer; margin-top: 10px; 
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); box-shadow: 0 4px 15px rgba(244, 121, 32, 0.3);
        }
        .btn-login:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(244, 121, 32, 0.5); }
        .btn-login:active { transform: scale(0.98); }
        
        .login-links { margin-top: 25px; display: flex; flex-direction: column; gap: 10px; font-size: 14px; }
        .login-links a { color: var(--primary-blue); text-decoration: none; font-weight: 600; transition: color 0.3s; }
        .login-links a:hover { color: var(--primary-orange); text-decoration: underline; }

        @media (max-width: 768px) {
            header { padding: 0 20px; }
            .footer-links { display: none; }
        }
    </style>
</head>
<body>

    <div class="loader-overlay" id="loaderOverlay">
        <div class="cyber-loader">
            <i class="fa-solid fa-gear loader-gear"></i>
        </div>
        <div class="loader-text">Autenticando</div>
    </div>

    <div class="background-visuals">
        <div class="tech-grid"></div>
        <div class="side-glow side-glow-left"></div>
        <div class="side-glow side-glow-right"></div>
    </div>
    
    <header>
        <a href="index.html" class="Logo">
            <img src="img/HLogo.png" alt="Logo AgendaCar" onerror="this.style.display='none'">
        </a>
    </header>

    <div class="login-container">
        <div class="login-card">
            <h2>Bem-vindo de volta!</h2>
            <p>Acesse sua conta para gerenciar seus agendamentos de forma inteligente.</p>
            
            <form id="form-login">
                <div id="error-msg" style="color: #d93025; background: #ffeaea; padding: 10px; border-radius: 8px; border: 1px solid #d93025; font-size: 14px; margin-bottom: 15px; display: none; font-weight: 500;"></div>

                <div class="form-group">
                    <label>E-mail</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" id="email" placeholder="Digite seu e-mail" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Senha</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" placeholder="Digite sua senha" required>
                    </div>
                </div>

                <button type="submit" class="btn-login">ENTRAR</button>
            </form>

            <div class="login-links">
                <a href="#">Esqueceu sua senha?</a>
                <p>Novo por aqui? <a href="cadastro.html">Crie sua conta</a></p>
            </div>
        </div>
    </div>

    <footer>
        <i class="fa-brands fa-instagram" title="Nosso Instagram"></i>
        <i class="fa-brands fa-youtube" title="Nosso Canal no YouTube"></i>
        
        <div class="footer-links">
            <a href="quem-somos.html">Quem Somos</a>
            <a href="fale-conosco.html">Fale Conosco</a>
            <a href="termos-uso.html">Termos de Uso</a>
        </div>
    </footer>

    <script>
        document.getElementById('form-login').addEventListener('submit', function(event) {
            event.preventDefault(); 
            
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('error-msg');

            const usuarios = JSON.parse(localStorage.getItem('agendacar_usuarios')) || [];
            const usuarioValido = usuarios.find(user => user.email === email && user.senha === password);

            if (usuarioValido) {
                const sessao = {
                    id: usuarioValido.id,
                    nome: usuarioValido.nome,
                    email: usuarioValido.email,
                    tipo: usuarioValido.tipo
                }; 

                localStorage.setItem('agendacar_sessao', JSON.stringify(sessao));
                document.getElementById('loaderOverlay').classList.add('active'); 
                
                setTimeout(() => {
                    window.location.href = 'home.html'; 
                }, 2000);
            } else {
                errorMsg.textContent = 'Acesso negado. Verifique seu e-mail ou senha.';
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
