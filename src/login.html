<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AgendaCar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-blue: #12368a;
            --primary-orange: #f47920;
            --orange-hover: #e06815;
            --bg-gray: #f5f6f8;
            --text-dark: #333;
            --text-blue: #1c3d7a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        
        body { 
            background-color: var(--bg-gray); 
            color: var(--text-dark); 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
            position: relative; 
            overflow: hidden; 
        }

        /* CABEÇALHO CORRIGIDO: width 100% e flex-shrink 0 garantem que ele ocupe a tela toda no topo */
        header { 
            background-color: var(--primary-blue); 
            height: 80px; 
            width: 100%;
            flex-shrink: 0; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 0 40px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.2); 
            position: relative; 
            z-index: 10; 
        }
        
        .Logo { display: flex; align-items: center; height: 100%; text-decoration: none;}
        .Logo img { height: 80px; width: auto; display: block; }

        .login-container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 40px 20px; position: relative; z-index: 10; }
        .login-card { background: white; width: 100%; max-width: 450px; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); border: 1px solid #eaeaea; text-align: center; }
        .login-card h2 { color: var(--text-blue); margin-bottom: 10px; font-size: 28px; }
        .login-card p { color: #666; margin-bottom: 30px; font-size: 14px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: var(--text-blue); }
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-wrapper i { position: absolute; left: 15px; color: #999; }
        .input-wrapper input { width: 100%; padding: 12px 12px 12px 40px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; outline: none; transition: border-color 0.3s; }
        .input-wrapper input:focus { border-color: var(--primary-blue); }
        .btn-login { width: 100%; background-color: var(--primary-orange); color: white; border: none; padding: 15px; border-radius: 6px; font-size: 18px; font-weight: 700; cursor: pointer; margin-top: 10px; transition: background 0.3s, transform 0.1s; }
        .btn-login:hover { background-color: var(--orange-hover); }
        .btn-login:active { transform: scale(0.98); }
        
        .login-links { margin-top: 25px; display: flex; flex-direction: column; gap: 10px; font-size: 14px; }
        .login-links a { color: var(--primary-blue); text-decoration: none; font-weight: 500; transition: color 0.3s; }
        .login-links a:hover { color: var(--primary-orange); text-decoration: underline; }

        /* =========================================
           ANIMAÇÕES DE FUNDO (MENORES E MAIS ELEMENTOS)
           ========================================= */
        .background-visuals {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; 
            pointer-events: none; 
        }

        .visual-element {
            position: absolute;
            animation-iteration-count: infinite;
            animation-timing-function: linear;
        }

        .color-blue { color: rgba(20, 60, 136, 0.15); }
        .color-orange { color: rgba(244, 121, 32, 0.18); }
        .color-gray { color: rgba(150, 150, 150, 0.25); }

        /* Lado Esquerdo - Itens Menores */
        .item-1 { font-size: 100px; top: 15%; left: 3%; animation-duration: 35s; animation-name: rotate; }
        .item-3 { font-size: 60px; top: 45%; left: 8%; animation-duration: 25s; animation-name: rotateReverse; }
        .item-5 { font-size: 45px; bottom: 20%; left: 5%; animation-duration: 15s; animation-name: floatReverse; animation-timing-function: ease-in-out; }
        .item-7 { font-size: 70px; bottom: 5%; left: 15%; animation-duration: 28s; animation-name: rotate; }
        .item-9 { font-size: 50px; top: 65%; left: 12%; animation-duration: 18s; animation-name: float; animation-timing-function: ease-in-out; }

        /* Lado Direito - Itens Menores */
        .item-2 { font-size: 120px; bottom: 10%; right: 2%; animation-duration: 40s; animation-name: rotateReverse; }
        .item-4 { font-size: 55px; top: 20%; right: 8%; animation-duration: 12s; animation-name: float; animation-timing-function: ease-in-out; }
        .item-6 { font-size: 75px; bottom: 40%; right: 10%; animation-duration: 22s; animation-name: rotate; }
        .item-8 { font-size: 45px; top: 50%; right: 4%; animation-duration: 16s; animation-name: floatReverse; animation-timing-function: ease-in-out; }
        .item-10 { font-size: 65px; top: 5%; right: 12%; animation-duration: 30s; animation-name: rotateReverse; }

        @keyframes rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes rotateReverse { 0% { transform: rotate(360deg); } 100% { transform: rotate(0deg); } }
        @keyframes float { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-15px) rotate(8deg); } }
        @keyframes floatReverse { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(15px) rotate(-8deg); } }

        /* OVERLAY DO CARRO NO LOGIN */
        .loader-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--primary-blue); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; opacity: 0; visibility: hidden; transition: opacity 0.4s ease; }
        .loader-overlay.active { opacity: 1; visibility: visible; }
        .car-animation-container { position: relative; width: 120px; height: 60px; margin-bottom: 30px; }
        .car-icon { font-size: 60px; color: var(--primary-orange); position: absolute; right: 0; bottom: 0; z-index: 2; animation: carDrive 0.3s infinite alternate ease-in-out; }
        .smoke { position: absolute; bottom: 5px; left: 10px; width: 14px; height: 14px; background-color: rgba(255, 255, 255, 0.8); border-radius: 50%; z-index: 1; opacity: 0; }
        .smoke-1 { animation: exhaust 1s linear infinite; }
        .smoke-2 { animation: exhaust 1s linear infinite 0.33s; }
        .smoke-3 { animation: exhaust 1s linear infinite 0.66s; }
        .loader-text { color: white; font-size: 20px; font-weight: 500; letter-spacing: 1px; animation: pulse 1.5s ease-in-out infinite; }
        
        @keyframes carDrive { 0% { transform: translateY(0); } 100% { transform: translateY(-5px); } }
        @keyframes exhaust { 0% { transform: translate(0, 0) scale(1); opacity: 0.8; } 100% { transform: translate(-60px, -20px) scale(3); opacity: 0; } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div class="loader-overlay" id="loaderOverlay">
        <div class="car-animation-container">
            <div class="smoke smoke-1"></div>
            <div class="smoke smoke-2"></div>
            <div class="smoke smoke-3"></div>
            <i class="fa-solid fa-car-side car-icon"></i>
        </div>
        <div class="loader-text">Acessando o sistema...</div>
    </div>

    <div class="background-visuals">
        <i class="fa-solid fa-gear visual-element color-blue item-1"></i>
        <i class="fa-solid fa-cog visual-element color-gray item-3"></i>
        <i class="fa-solid fa-screwdriver-wrench visual-element color-orange item-5"></i>
        <i class="fa-solid fa-wrench visual-element color-blue item-7"></i>
        <i class="fa-solid fa-hammer visual-element color-gray item-9"></i>

        <i class="fa-solid fa-gear visual-element color-orange item-2"></i>
        <i class="fa-solid fa-wrench visual-element color-blue item-4"></i>
        <i class="fa-solid fa-cog visual-element color-gray item-6"></i>
        <i class="fa-solid fa-hammer visual-element color-orange item-8"></i>
        <i class="fa-solid fa-screwdriver-wrench visual-element color-blue item-10"></i>
    </div>
    
    <header>
        <a href="index.html" class="Logo">
            <img src="img/Logo.jpg" alt="Logo AgendaCar">
        </a>
    </header>

    <div class="login-container">
        <div class="login-card">
            <h2>Bem-vindo!</h2>
            <p>Acesse sua conta para gerenciar seus agendamentos.</p>
            
            <form id="form-login">
                <div id="error-msg" style="color: red; font-size: 14px; margin-bottom: 15px; display: none; font-weight: 500;"></div>

                <div class="form-group">
                    <label>E-mail</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-user"></i>
                        <input type="email" id="email" placeholder="Digite seu e-mail" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Senha</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" placeholder="Digite sua senha" required>
                    </div>
                </div>

                <button type="submit" class="btn-login">Entrar</button>
            </form>

            <div class="login-links">
                <a href="#">Esqueceu sua senha?</a>
                <p>Ainda não tem conta? <a href="cadastro.html">Cadastre-se aqui</a></p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('form-login').addEventListener('submit', function(event) {
            event.preventDefault(); 
            
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('error-msg');

            const usuarios = JSON.parse(localStorage.getItem('agendacar_usuarios')) || [];
            const usuarioValido = usuarios.find(user => user.email === email && user.senha === password);

            if (usuarioValido) {
                const sessao = {
                    id: usuarioValido.id,
                    nome: usuarioValido.nome,
                    email: usuarioValido.email,
                    tipo: usuarioValido.tipo
                }; 

                localStorage.setItem('agendacar_sessao', JSON.stringify(sessao));
                
                const loader = document.getElementById('loaderOverlay');
                loader.classList.add('active'); 
                
                setTimeout(() => {
                    window.location.href = 'home.html'; 
                }, 2000);

            } else {
                errorMsg.textContent = 'E-mail ou senha incorretos. Tente novamente.';
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
