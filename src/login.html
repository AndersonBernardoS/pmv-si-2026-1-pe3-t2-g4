<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AgendaCar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-blue: #12368a;
            --primary-orange: #f47920;
            --orange-hover: #e06815;
            --bg-gray: #f5f6f8;
            --text-dark: #333;
            --text-blue: #1c3d7a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        
        body { 
            background-color: var(--bg-gray); 
            color: var(--text-dark); 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
            position: relative; 
            overflow: hidden; 
        }

        header { 
            background-color: var(--primary-blue); 
            height: 80px; 
            width: 100%;
            flex-shrink: 0; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 0 40px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.2); 
            position: relative; 
            z-index: 10; 
        }
        
        .Logo { display: flex; align-items: center; height: 100%; text-decoration: none;}
        .Logo img { height: 80px; width: auto; display: block; }

        .login-container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 40px 20px; position: relative; z-index: 10; }
        
        /* Card com leve efeito "Glassmorphism" (Vidro) */
        .login-card { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px);
            width: 100%; 
            max-width: 450px; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            border: 1px solid rgba(255, 255, 255, 0.5); 
            text-align: center; 
        }
        .login-card h2 { color: var(--text-blue); margin-bottom: 10px; font-size: 28px; }
        .login-card p { color: #666; margin-bottom: 30px; font-size: 14px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: var(--text-blue); }
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-wrapper i { position: absolute; left: 15px; color: #999; }
        .input-wrapper input { width: 100%; padding: 12px 12px 12px 40px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; outline: none; transition: border-color 0.3s; background: white;}
        .input-wrapper input:focus { border-color: var(--primary-blue); }
        .btn-login { width: 100%; background-color: var(--primary-orange); color: white; border: none; padding: 15px; border-radius: 6px; font-size: 18px; font-weight: 700; cursor: pointer; margin-top: 10px; transition: background 0.3s, transform 0.1s; }
        .btn-login:hover { background-color: var(--orange-hover); }
        .btn-login:active { transform: scale(0.98); }
        
        .login-links { margin-top: 25px; display: flex; flex-direction: column; gap: 10px; font-size: 14px; }
        .login-links a { color: var(--primary-blue); text-decoration: none; font-weight: 500; transition: color 0.3s; }
        .login-links a:hover { color: var(--primary-orange); text-decoration: underline; }

        /* =========================================
           ANIMAÇÕES DE FUNDO (PULSANDO E FLUTUANDO)
           ========================================= */
        .background-visuals {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; 
            pointer-events: none; 
            background: linear-gradient(135deg, #f5f6f8 0%, #e4e9f2 100%);
            overflow: hidden;
        }

        /* Grade Tecnológica Sutil no Fundo */
        .tech-grid {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(18, 54, 138, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(18, 54, 138, 0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 1;
        }

        /* Orbes de Luz com Animação de Pulso */
        .glowing-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            animation: floatOrb infinite alternate ease-in-out;
            z-index: 2;
            /* A opacidade agora é controlada inteiramente pelos @keyframes */
        }

        .orb-blue {
            width: 400px; height: 400px;
            background: var(--primary-blue);
            top: -10%; left: -10%;
            animation-duration: 18s; /* Tempos ajustados para fluidez */
        }

        .orb-orange {
            width: 350px; height: 350px;
            background: var(--primary-orange);
            bottom: -15%; right: -5%;
            animation-duration: 22s;
            animation-direction: alternate-reverse;
        }

        .orb-light {
            width: 300px; height: 300px;
            background: #badfe9;
            top: 30%; left: 40%;
            animation-duration: 26s;
        }

        /* Nova Animação: Flutua E muda a opacidade (apagando e acendendo) */
        @keyframes floatOrb {
            0% { 
                transform: translate(0, 0) scale(1); 
                opacity: 0.1; /* Luz quase apagada */
            }
            50% { 
                opacity: 0.8; /* Luz acesa/forte no meio do trajeto */
            }
            100% { 
                transform: translate(60px, -60px) scale(1.15); 
                opacity: 0.1; /* Luz apaga novamente no final */
            }
        }

        /* =========================================
           OVERLAY DE CARREGAMENTO (ANÉIS + ENGRENAGEM)
           ========================================= */
        .loader-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background-color: rgba(18, 54, 138, 0.95); 
            backdrop-filter: blur(5px); 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 9999; opacity: 0; visibility: hidden; transition: opacity 0.4s ease; 
        }
        .loader-overlay.active { opacity: 1; visibility: visible; }
        
        .cyber-loader {
            position: relative;
            width: 90px;
            height: 90px;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .cyber-loader::before, .cyber-loader::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            border: 3px solid transparent;
        }
        .cyber-loader::before {
            top: 0; left: 0; right: 0; bottom: 0;
            border-top-color: var(--primary-orange);
            border-bottom-color: var(--primary-orange);
            animation: spin 1.5s linear infinite;
        }
        .cyber-loader::after {
            top: 12px; left: 12px; right: 12px; bottom: 12px;
            border-left-color: #fff;
            border-right-color: #fff;
            animation: spinReverse 1s linear infinite;
        }

        .loader-gear {
            font-size: 28px;
            color: #fff;
            animation: spin 3s linear infinite;
            z-index: 2;
        }

        .loader-text { color: white; font-size: 18px; font-weight: 500; letter-spacing: 2px; animation: pulseText 1.5s ease-in-out infinite; text-transform: uppercase;}
        
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes spinReverse { 0% { transform: rotate(360deg); } 100% { transform: rotate(0deg); } }
        @keyframes pulseText { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div class="loader-overlay" id="loaderOverlay">
        <div class="cyber-loader">
            <i class="fa-solid fa-gear loader-gear"></i>
        </div>
        <div class="loader-text">Autenticando</div>
    </div>

    <div class="background-visuals">
        <div class="tech-grid"></div>
        <div class="glowing-orb orb-blue"></div>
        <div class="glowing-orb orb-orange"></div>
        <div class="glowing-orb orb-light"></div>
    </div>
    
    <header>
        <a href="index.html" class="Logo">
            <img src="img/Logo.jpg" alt="Logo AgendaCar" onerror="this.style.display='none'">
        </a>
    </header>

    <div class="login-container">
        <div class="login-card">
            <h2>Bem-vindo!</h2>
            <p>Acesse sua conta para gerenciar seus agendamentos.</p>
            
            <form id="form-login">
                <div id="error-msg" style="color: red; font-size: 14px; margin-bottom: 15px; display: none; font-weight: 500;"></div>

                <div class="form-group">
                    <label>E-mail</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-user"></i>
                        <input type="email" id="email" placeholder="Digite seu e-mail" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Senha</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" placeholder="Digite sua senha" required>
                    </div>
                </div>

                <button type="submit" class="btn-login">Entrar</button>
            </form>

            <div class="login-links">
                <a href="#">Esqueceu sua senha?</a>
                <p>Ainda não tem conta? <a href="cadastro.html">Cadastre-se aqui</a></p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('form-login').addEventListener('submit', function(event) {
            event.preventDefault(); 
            
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('error-msg');

            const usuarios = JSON.parse(localStorage.getItem('agendacar_usuarios')) || [];
            const usuarioValido = usuarios.find(user => user.email === email && user.senha === password);

            if (usuarioValido) {
                const sessao = {
                    id: usuarioValido.id,
                    nome: usuarioValido.nome,
                    email: usuarioValido.email,
                    tipo: usuarioValido.tipo
                }; 

                localStorage.setItem('agendacar_sessao', JSON.stringify(sessao));
                
                const loader = document.getElementById('loaderOverlay');
                loader.classList.add('active'); 
                
                setTimeout(() => {
                    window.location.href = 'home.html'; 
                }, 2000);

            } else {
                errorMsg.textContent = 'E-mail ou senha incorretos. Tente novamente.';
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
