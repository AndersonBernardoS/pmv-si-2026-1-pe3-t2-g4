<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AgendaCar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-blue: #1c3d7a;
            --sidebar-blue: #2a56a6;
            --primary-orange: #f47920;
            --orange-hover: #e06815;
            --bg-gray: #f5f6f8;
            --text-dark: #333;
            --text-blue: #1c3d7a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        body { background-color: var(--bg-gray); color: var(--text-dark); display: flex; flex-direction: column; min-height: 100vh; }
        header { background-color: var(--primary-blue); height: 80px; display: flex; justify-content: space-between; align-items: center; padding: 0 40px; color: white; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 10; }
        .logo { display: flex; align-items: center; gap: 10px; font-size: 24px; font-weight: 700; text-transform: uppercase; text-decoration: none; cursor: pointer; }
        .logo i, .logo span { color: white; }
        .login-container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 40px 20px; }
        .login-card { background: white; width: 100%; max-width: 450px; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #eaeaea; text-align: center; }
        .login-card h2 { color: var(--text-blue); margin-bottom: 10px; font-size: 28px; }
        .login-card p { color: #666; margin-bottom: 30px; font-size: 14px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: var(--text-blue); }
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-wrapper i { position: absolute; left: 15px; color: #999; }
        .input-wrapper input { width: 100%; padding: 12px 12px 12px 40px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; outline: none; transition: border-color 0.3s; }
        .input-wrapper input:focus { border-color: var(--primary-blue); }
        .btn-login { width: 100%; background-color: var(--primary-orange); color: white; border: none; padding: 15px; border-radius: 6px; font-size: 18px; font-weight: 700; cursor: pointer; margin-top: 10px; transition: background 0.3s; }
        .btn-login:hover { background-color: var(--orange-hover); }
        .login-links { margin-top: 25px; display: flex; flex-direction: column; gap: 10px; font-size: 14px; }
        .login-links a { color: var(--primary-blue); text-decoration: none; font-weight: 500; transition: color 0.3s; }
        .login-links a:hover { color: var(--primary-orange); text-decoration: underline; }
        footer { background-color: #e6e6e6; padding: 15px 40px; display: flex; justify-content: flex-start; align-items: center; gap: 15px; }
        footer i { font-size: 28px; color: #333; cursor: pointer; transition: color 0.3s; }
        footer i:hover { color: var(--primary-orange); }
    </style>
</head>
<body>

    <header>
        <a href="home.html" class="logo">
            <i class="fa-solid fa-car"></i>
            <span>AGENDA<strong style="color:var(--primary-orange)">CAR</strong></span>
        </a>
    </header>

    <div class="login-container">
        <div class="login-card">
            <h2>Bem-vindo de volta!</h2>
            <p>Acesse sua conta para gerenciar seus agendamentos.</p>
            
            <form id="form-login">
                <div id="error-msg" style="color: red; font-size: 14px; margin-bottom: 15px; display: none; font-weight: 500;"></div>

                <div class="form-group">
                    <label for="email">E-mail</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-user"></i>
                        <input type="email" id="email" placeholder="Digite seu e-mail" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Senha</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" placeholder="Digite sua senha" required>
                    </div>
                </div>

                <button type="submit" class="btn-login">Entrar</button>
            </form>

            <div class="login-links">
                <a href="#">Esqueceu sua senha?</a>
                <p>Ainda não tem conta? <a href="cadastro.html">Cadastre-se aqui</a></p>
            </div>
        </div>
    </div>

    <footer>
        <i class="fa-brands fa-instagram"></i>
        <i class="fa-brands fa-youtube"></i>
    </footer>

    <script>
        document.getElementById('form-login').addEventListener('submit', function(event) {
            event.preventDefault(); 
            
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('error-msg');

            const usuarios = JSON.parse(localStorage.getItem('agendacar_usuarios')) || [];

            const usuarioValido = usuarios.find(user => user.email === email && user.senha === password);

            if (usuarioValido) {
                const sessao = {
                    id: usuarioValido.id,
                    nome: usuarioValido.nome,
                    email: usuarioValido.email,
                    tipo: usuarioValido.tipo
                };

                localStorage.setItem('agendacar_sessao', JSON.stringify(sessao));
                
                // Redireciona para a página principal
                window.location.href = 'home.html'; 
            } else {
                errorMsg.textContent = 'E-mail ou senha incorretos. Verifique seus dados ou cadastre-se.';
                errorMsg.style.display = 'block';
            }
        });
    </script>

</body>
</html>
