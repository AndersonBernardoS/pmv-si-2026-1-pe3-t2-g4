<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fale Conosco - AgendaCar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-blue: #12368a;
            --primary-orange: #f47920;
            --orange-hover: #e06815;
            --bg-gray: #f5f6f8;
            --text-dark: #2d3748;
            --text-light: #4a5568;
            --text-blue: #1c3d7a;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.5);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        body { background-color: var(--bg-gray); color: var(--text-dark); display: flex; flex-direction: column; min-height: 100vh; position: relative; overflow-x: hidden; }

        /* ANIMAÇÕES DE FUNDO */
        .background-visuals { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; background: linear-gradient(135deg, #e4e9f2 0%, #d8dfea 100%); overflow: hidden; }
        .tech-grid { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(16, 60, 143, 0.12) 1px, transparent 1px), linear-gradient(90deg, rgba(16, 60, 143, 0.12) 1px, transparent 1px); background-size: 60px 60px; transform: perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px); animation: gridMove 20s linear infinite; }
        @keyframes gridMove { 0% { transform: perspective(500px) rotateX(60deg) translateY(0) translateZ(-200px); } 100% { transform: perspective(500px) rotateX(60deg) translateY(60px) translateZ(-200px); } }
        .side-glow { position: absolute; top: 0; bottom: 0; width: 250px; filter: blur(90px); }
        .side-glow-left { left: -50px; background: var(--primary-blue); animation: fadeGlow 4s infinite alternate ease-in-out; }
        .side-glow-right { right: -50px; background: var(--primary-orange); animation: fadeGlow 5.5s infinite alternate ease-in-out; }
        @keyframes fadeGlow { 0% { opacity: 0; } 100% { opacity: 0.6; } }

        /* HEADER */
        header { background: rgba(16, 60, 143, 0.95); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); height: 80px; display: flex; justify-content: space-between; align-items: center; padding: 0 40px; box-shadow: 0 4px 30px rgba(0,0,0,0.1); border-bottom: 1px solid rgba(255,255,255,0.2); position: sticky; top: 0; z-index: 100; }
        .Logo { display: flex; align-items: center; height: 100%; text-decoration: none; }
        .Logo img { height: 60px; width: auto; display: block; border-radius: 8px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
        
        .header-actions { display: flex; gap: 15px; align-items: center; }
        .btn-header { display: flex; align-items: center; gap: 8px; color: white; padding: 10px 20px; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .btn-login { background: linear-gradient(135deg, var(--primary-orange), #ff9040); border: 1px solid rgba(255,255,255,0.4); box-shadow: 0 4px 15px rgba(244, 121, 32, 0.3); }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(244, 121, 32, 0.5); }
        .btn-panel { background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255,255,255,0.4); backdrop-filter: blur(10px); }
        .btn-panel:hover { background: rgba(255, 255, 255, 0.25); transform: translateY(-2px); }

        /* FOOTER PADRÃO ESCURO */
        footer { background: rgb(42, 50, 59); backdrop-filter: blur(10px); border-top: 1px solid rgba(0,0,0,0.2); padding: 15px 40px; display: flex; justify-content: flex-start; align-items: center; gap: 20px; margin-top: auto; position: relative; z-index: 20; }
        footer i { font-size: 24px; color: #a0aec0; cursor: pointer; transition: color 0.3s, transform 0.2s; }
        footer i:hover { color: var(--primary-orange); transform: scale(1.15) translateY(-2px); }
        .footer-links { margin-left: auto; display: flex; gap: 25px; }
        .footer-links a { color: #cbd5e1; text-decoration: none; font-size: 14px; font-weight: 500; transition: color 0.3s; }
        .footer-links a:hover { color: var(--primary-orange); }

        /* CONTEÚDO GLASSMORPHISM */
        .content-wrapper { flex: 1; display: flex; justify-content: center; align-items: flex-start; padding: 60px 20px; position: relative; z-index: 20;}
        .content-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.8), rgba(255, 255, 255, 0.4)); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            width: 100%; max-width: 900px; padding: 50px; border-radius: 24px;
            box-shadow: var(--glass-shadow); border: 1px solid var(--glass-border); 
            border-top: 1px solid rgba(255,255,255,0.9); border-left: 1px solid rgba(255,255,255,0.9);
        }
        .content-card h1 { color: var(--text-blue); margin-bottom: 25px; font-size: 36px; border-bottom: 3px solid var(--primary-orange); padding-bottom: 8px; display: inline-block; font-weight: 800;}
        .content-card p { margin-bottom: 30px; line-height: 1.7; color: var(--text-light); font-size: 16px; font-weight: 500;}

        /* FORMULÁRIO FALE CONOSCO */
        .contact-form { display: flex; flex-direction: column; gap: 20px; }
        .form-group { text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--text-blue); font-size: 14px;}
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-wrapper i { position: absolute; left: 15px; color: var(--primary-blue); opacity: 0.7;}
        
        .input-wrapper input, .input-wrapper textarea { 
            width: 100%; padding: 14px 12px 14px 45px; 
            border: 1px solid rgba(255,255,255,0.6); border-radius: 10px; font-size: 15px; 
            outline: none; transition: all 0.3s; background: rgba(255,255,255,0.6);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02); color: var(--text-dark);
        }
        .input-wrapper textarea { padding-left: 15px; } 
        .input-wrapper input:focus, .input-wrapper textarea:focus { border-color: var(--primary-blue); background: white; box-shadow: 0 0 0 3px rgba(16, 60, 143, 0.1); }
        
        .btn-submit { 
            background: linear-gradient(135deg, var(--primary-orange), #ff9040); 
            color: white; border: 1px solid rgba(255,255,255,0.4); padding: 16px 32px; 
            border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); box-shadow: 0 4px 15px rgba(244, 121, 32, 0.3);
            display: inline-flex; align-items: center; justify-content: center; gap: 10px; align-self: flex-start;
        }
        .btn-submit:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(244, 121, 32, 0.5); }

        @media (max-width: 768px) {
            .content-card { padding: 30px 20px; }
            header { padding: 0 20px; }
            .header-actions { flex-direction: column; gap: 10px; }
            .footer-links { display: none; }
        }
    </style>
</head>
<body>

    <div class="background-visuals">
        <div class="tech-grid"></div>
        <div class="side-glow side-glow-left"></div>
        <div class="side-glow side-glow-right"></div>
    </div>

    <header>
        <a href="index.html" class="Logo">
            <img src="img/Logo.jpg" alt="Logo AgendaCar" onerror="this.style.display='none'">
        </a>
        <div class="header-actions">
            <button class="btn-header btn-panel" id="btnPanel" onclick="window.location.href='home.html'" style="display: none;">
                <i class="fa-solid fa-chart-line"></i> Painel
            </button>
            <button class="btn-header btn-login" id="btnLogin" onclick="window.location.href='login.html'">
                <i class="fa-solid fa-right-to-bracket"></i> Entrar / Cadastrar
            </button>
        </div>
    </header>

    <main class="content-wrapper">
        <div class="content-card">
            <h1>Fale Conosco</h1>
            <p>Tem alguma dúvida, sugestão ou encontrou algum problema no AgendaCar? Nossa equipe está pronta para te ajudar. Preencha o formulário abaixo e entraremos em contato.</p>
            
            <form class="contact-form" onsubmit="event.preventDefault(); alert('Mensagem enviada com sucesso! Nossa equipe retornará em breve.'); this.reset();">
                
                <div class="form-group">
                    <label for="nome">Nome Completo</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" id="nome" placeholder="Seu nome completo" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" id="email" placeholder="seuemail@exemplo.com" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="assunto">Assunto</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-circle-info"></i>
                        <input type="text" id="assunto" placeholder="Ex: Dúvida sobre agendamento" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="mensagem">Mensagem</label>
                    <div class="input-wrapper">
                        <textarea id="mensagem" rows="5" placeholder="Como podemos te ajudar?" required></textarea>
                    </div>
                </div>
                
                <button type="submit" class="btn-submit">
                    <i class="fa-solid fa-paper-plane"></i> Enviar Mensagem
                </button>
            </form>
        </div>
    </main>

    <footer>
        <i class="fa-brands fa-instagram" title="Nosso Instagram"></i>
        <i class="fa-brands fa-youtube" title="Nosso Canal no YouTube"></i>
        <div class="footer-links">
            <a href="quem-somos.html">Quem Somos</a>
            <a href="fale-conosco.html">Fale Conosco</a>
            <a href="termos-uso.html">Termos de Uso</a>
            <a href="politica-privacidade.html">Privacidade</a>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const sessaoStr = localStorage.getItem('agendacar_sessao');
            if (sessaoStr) {
                const btnLogin = document.getElementById('btnLogin');
                const btnPanel = document.getElementById('btnPanel');
                
                if (btnLogin && btnPanel) {
                    // Oculta o botão de login se o usuário estiver logado
                    btnLogin.style.display = 'none';
                    // Exibe o botão de ir para o painel
                    btnPanel.style.display = 'flex';
                }
            }
        });
    </script>
</body>
</html>
