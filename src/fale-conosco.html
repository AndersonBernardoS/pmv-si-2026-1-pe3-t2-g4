<main class="content">
    <div class="content-card">
        <h1>Fale Conosco</h1>
        <p>Tem alguma dúvida, sugestão ou encontrou algum problema no AgendaCar? Nossa equipe está pronta para te ajudar. Preencha o formulário abaixo ou entre em contato pelas nossas redes sociais.</p>
        
        <form class="contact-form" onsubmit="event.preventDefault(); alert('Mensagem enviada com sucesso! Nossa equipe retornará em breve.'); this.reset();">
            <div>
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" placeholder="Seu nome" required>
            </div>
            
            <div>
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="seuemail@exemplo.com" required>
            </div>
            
            <div>
                <label for="assunto">Assunto</label>
                <input type="text" id="assunto" placeholder="Ex: Dúvida sobre agendamento" required>
            </div>
            
            <div>
                <label for="mensagem">Mensagem</label>
                <textarea id="mensagem" rows="5" placeholder="Como podemos te ajudar?" required></textarea>
            </div>
            
            <button type="submit" class="btn-submit"><i class="fa-solid fa-paper-plane"></i> Enviar Mensagem</button>
        </form>
    </div>
        <head>
        <style>
/* Card para páginas de texto (Quem somos, Termos, etc) */
.content-card {
    background: white;
    width: 100%;
    max-width: 900px;
    padding: 40px 50px;
    border-radius: 12px;
    box-shadow: 0 4px 25px rgba(0,0,0,0.05);
    border: 1px solid rgba(0, 0, 0, 0.04);
    text-align: left;
    margin-bottom: 40px;
}
.content-card h1 { color: var(--text-blue); margin-bottom: 20px; font-size: 28px; border-bottom: 2px solid var(--primary-orange); padding-bottom: 10px; display: inline-block;}
.content-card h2 { color: var(--text-blue); margin-top: 25px; margin-bottom: 15px; font-size: 20px; }
.content-card p { margin-bottom: 15px; line-height: 1.6; color: #555; }
.content-card ul { margin-left: 20px; margin-bottom: 15px; color: #555; line-height: 1.6; }

/* Estilos para o formulário de contato */
.contact-form { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
.contact-form label { font-weight: 500; color: var(--text-blue); }
.contact-form input, .contact-form textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; outline: none; font-family: 'Roboto', sans-serif; }
.contact-form input:focus, .contact-form textarea:focus { border-color: var(--primary-blue); }
.btn-submit { background-color: var(--primary-orange); color: white; border: none; padding: 15px; border-radius: 6px; font-size: 16px; font-weight: 700; cursor: pointer; transition: background 0.3s; width: 200px; }
.btn-submit:hover { background-color: var(--orange-hover); }
        </style>
    </head>
    </body>
</main>
