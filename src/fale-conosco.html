<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fale Conosco - AgendaCar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-blue: #12368a;
            --primary-orange: #f47920;
            --orange-hover: #e06815;
            --bg-gray: #f5f6f8;
            --text-dark: #333;
            --text-blue: #1c3d7a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        
        body { 
            background-color: var(--bg-gray); 
            color: var(--text-dark); 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
        }

        /* HEADER PADRÃO */
        header { 
            background-color: var(--primary-blue); 
            height: 80px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 0 40px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.2); 
            z-index: 10; 
        }
        
        .Logo { display: flex; align-items: center; height: 100%; text-decoration: none; }
        .Logo img { height: 80px; width: auto; display: block; }
        
        .btn-header { 
            background-color: var(--primary-orange); 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 5px; 
            font-size: 15px; 
            font-weight: 700; 
            cursor: pointer; 
            transition: background 0.3s; 
        }
        .btn-header:hover { background-color: var(--orange-hover); }

        /* ÁREA DE CONTEÚDO */
        .content-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
        }

        /* CARD DE TEXTO E FORMULÁRIO */
        .content-card {
            background: white;
            width: 100%;
            max-width: 900px;
            padding: 50px;
            border-radius: 12px;
            border: 1px solid #eaeaea;
            box-shadow: 0 4px 25px rgba(0,0,0,0.05);
        }

        .content-card h1 { 
            color: var(--text-blue); 
            margin-bottom: 25px; 
            font-size: 32px; 
            border-bottom: 3px solid var(--primary-orange); 
            padding-bottom: 8px; 
            display: inline-block;
        }

        .content-card p { 
            margin-bottom: 18px; 
            line-height: 1.7; 
            color: #444; 
            font-size: 16px;
        }

        /* ESTILOS DO FORMULÁRIO */
        .contact-form { 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            margin-top: 30px; 
        }

        .contact-form label { 
            font-weight: 500; 
            color: var(--text-blue); 
            margin-bottom: -15px; 
        }

        .contact-form input, .contact-form textarea { 
            width: 100%; 
            padding: 14px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            font-size: 16px; 
            background-color: #fafafa;
            transition: all 0.3s;
        }

        .contact-form input:focus, .contact-form textarea:focus { 
            border-color: var(--primary-orange); 
            background-color: white;
            outline: none;
            box-shadow: 0 0 0 3px rgba(255, 126, 21, 0.1);
        }

        .btn-submit { 
            background-color: var(--primary-orange); 
            color: white; 
            border: none; 
            padding: 16px 32px; 
            border-radius: 8px; 
            font-size: 16px; 
            font-weight: 700; 
            cursor: pointer; 
            transition: background 0.3s; 
            align-self: flex-start;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-submit:hover { background-color: var(--orange-hover); }

        /* FOOTER PADRÃO */
        footer { 
            background-color: #e6e6e6; 
            padding: 20px 40px; 
            display: flex; 
            justify-content: flex-start; 
            align-items: center; 
            gap: 15px; 
        }
        footer i { font-size: 24px; color: #333; cursor: pointer; transition: color 0.3s; }
        footer i:hover { color: var(--primary-orange); }

        @media (max-width: 768px) {
            .content-card { padding: 30px 20px; }
            header { padding: 0 20px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="Logo">
            <img src="img/Logo.jpg" alt="Logo AgendaCar">
        </div>
        <button id="btn-header" class="btn-header" onclick="window.location.href='login.html'">Entrar / Cadastrar</button>
    </header>

    <main class="content-wrapper">
        <div class="content-card">
            <h1>Fale Conosco</h1>
            <p>Tem alguma dúvida, sugestão ou encontrou algum problema no AgendaCar? Nossa equipe está pronta para te ajudar. Preencha o formulário abaixo e entraremos em contato.</p>
            
            <form class="contact-form" onsubmit="event.preventDefault(); alert('Mensagem enviada com sucesso! Nossa equipe retornará em breve.'); this.reset();">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" placeholder="Seu nome completo" required>
                
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="seuemail@exemplo.com" required>
                
                <label for="assunto">Assunto</label>
                <input type="text" id="assunto" placeholder="Ex: Dúvida sobre agendamento" required>
                
                <label for="mensagem">Mensagem</label>
                <textarea id="mensagem" rows="5" placeholder="Como podemos te ajudar?" required></textarea>
                
                <button type="submit" class="btn-submit">
                    <i class="fa-solid fa-paper-plane"></i> Enviar Mensagem
                </button>
            </form>
        </div>
    </main>

    <footer>
        <i class="fa-brands fa-instagram"></i>
        <i class="fa-brands fa-youtube"></i>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const sessaoStr = localStorage.getItem('agendacar_sessao');
            const btnHeader = document.getElementById('btn-header');
            
            if (sessaoStr && btnHeader) {
                const usuario = JSON.parse(sessaoStr);
                const primeiroNome = (usuario.nome || 'Usuário').split(' ')[0];
                
                btnHeader.innerHTML = `<i class="fa-solid fa-user"></i> Painel `;
                btnHeader.onclick = function() {
                    window.location.href = 'home.html'; 
                };
            }
        });
    </script>
</body>
</html>
